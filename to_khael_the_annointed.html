<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Letter Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Press Start 2P', cursive;
      background-color: #001a18;
      color: #0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .app {
      text-align: center;
      width: 70%;
      padding: 20px;
      border: 4px solid #0f0;
      background-color: #000;
    }

    .letter-container {
      margin-top: 100px;
      min-height: 350px;
    }

    .letter {
      white-space: pre-wrap;
      line-height: 1.5;
      font-size: 35px;
      position: relative;
    }

    /* Blinking cursor */
    .letter::after {
      content: "|";
      animation: blink 1s infinite;
      position: absolute;
      right: -10px;
    }

    @keyframes blink {
      0%, 50%, 100% { opacity: 1; }
      25%, 75% { opacity: 0; }
    }

    button {
      font-family: 'Press Start 2P', cursive;
      background-color: #000;
      color: #0f0;
      border: 2px solid #0f0;
      padding: 10px 20px;
      margin: 0 10px;
      cursor: pointer;
    }

    button:disabled {
      color: #555;
      border-color: #555;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="letter-container">
      <pre id="letter" class="letter"></pre>
    </div>
    <div class="buttons">
      <button id="prevBtn">← Back</button>
      <button id="nextBtn">Next →</button>
    </div>
  </div>

  <script>
    const letters = [
        "To the one who is Annointed.",
        "God is the only One\nwho truly knows you.",
        "He knows your heart\nand everything about you.\nHe knows you from the beginning\nto the end.",
        "He knows when you sit down or stand up.\nHe knows your thoughts when you're near\nor even when you're far away.",
        "He sees when you travel to school\nor when you rest at home.\nHe sees everything you do.",
        "He knows everything you say\n even before you say or think about it.",
        "He hears every word you speak.",
        "He is ahead of you,\nand will always be\nbehind you at the same time.",
        "He holds you in His hands.",
        "His Spirit will always be watching\nand abiding you.",
        "He is there when you wake up in the morning\nor when you lie down to sleep in the evening.",
        "He will be there when you soar high\neven above the peak of a mountain.\nHe will be there even when you are\nin the lowest valleys.",
        "He is there when there is light.\nHe is there even in the dark.",
        "He created you.",
        "Every part of your being\nis wonderfully and fearfully made.",
        "You are the way you are\nfor His divine purpose.",
        "He saw you before you were even\nconceived in your mother's womb.\nEvery day of your life\nis already planned in His books.",
        "His thoughts for you are\nas numerous as the sands in the seashore,\nas vast as the universe.",
        "He longs to partner with you.",
        "May you allow Him to search you\nin your heart.",
        "May you desire the same longing for His presence\nas He desires to be with you.",
        "...",
        "...",
        "Jesus loves you...",
        "now and forever.",
    ];

    const letterEl = document.getElementById('letter');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    let currentIndex = 0;
    let typingInterval;
    let isTyping = false;

    // Typing animation function
    function typeLetter(text, callback) {
        letterEl.textContent = ""; // clear previous text
        let i = 0;

        // Show ellipsis first
        letterEl.textContent = "...";

        setTimeout(() => {
        letterEl.textContent = ""; // clear ellipsis
        isTyping = true;

        typingInterval = setInterval(() => {
            letterEl.textContent += text[i];
            i++;
            if (i >= text.length) {
            clearInterval(typingInterval);
            isTyping = false;
            updateButtons();
            if (callback) callback();
            }
        }, 50); // typing speed
        }, 500); // ellipsis duration
    }

    // Update button states
    function updateButtons() {
        prevBtn.disabled = currentIndex === 0 || isTyping;
        nextBtn.disabled = currentIndex === letters.length - 1 || isTyping;
    }

    // Button click events
    prevBtn.addEventListener('click', () => {
        if (currentIndex > 0 && !isTyping) {
        currentIndex--;
        typeLetter(letters[currentIndex]);
        updateButtons();
        }
    });

    nextBtn.addEventListener('click', () => {
        if (currentIndex < letters.length - 1 && !isTyping) {
        currentIndex++;
        typeLetter(letters[currentIndex]);
        updateButtons();
        }
    });

    // Key press events for left/right arrow keys
    document.addEventListener('keydown', (e) => {
        if (isTyping) return; // prevent skipping while typing
        if (e.key === "ArrowLeft") {
        if (currentIndex > 0) {
            currentIndex--;
            typeLetter(letters[currentIndex]);
            updateButtons();
        }
        } else if (e.key === "ArrowRight") {
        if (currentIndex < letters.length - 1) {
            currentIndex++;
            typeLetter(letters[currentIndex]);
            updateButtons();
        }
        }
    });

    // Initialize first letter
    typeLetter(letters[currentIndex]);
    updateButtons();
    </script>
</body>
</html>
